<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ironGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e2a38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a4f63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5c3a21;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2312;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background split -->
  <rect width="600" height="400" fill="url(#ironGrad)" />
  <rect x="600" width="600" height="400" fill="url(#emberGrad)" />

  <!-- Ironveil Emblem (Stylized Cog) -->
  <g transform="translate(180, 200)" opacity="0.4" stroke="#6B8EAF" stroke-width="15" fill="none">
    <circle r="80" />
    <path d="M-100,0 L100,0 M0,-100 L0,100 M-70,-70 L70,70 M-70,70 L70,-70" />
    <circle r="40" fill="#6B8EAF" opacity="0.2" />
  </g>

  <!-- Embercrown Emblem (Stylized Crown) -->
  <g transform="translate(1020, 200)" opacity="0.4" stroke="#B87333" stroke-width="15" fill="none">
    <path d="M-80,60 L80,60 L100,-40 L50,10 L0,-60 L-50,10 L-100,-40 Z" />
    <circle cy="60" r="10" fill="#B87333" />
  </g>

  <!-- Center Overlay -->
  <path d="M 500 0 L 700 0 L 650 400 L 550 400 Z" fill="#121212" opacity="0.9" filter="url(#shadow)" />
  
  <!-- Main Title -->
  <text x="600" y="190" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="72" fill="#ffffff" text-anchor="middle" filter="url(#shadow)" letter-spacing="8">BOTH SIDES</text>
  
  <!-- Subtitle -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-weight="lighter" font-size="20" fill="#DAA520" text-anchor="middle" letter-spacing="12">DOUBLE AGENT WAR COUNCIL</text>

  <!-- Decorative Lines -->
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#ffffff" stroke-width="1" opacity="0.1" />
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#ffffff" stroke-width="1" opacity="0.1" />
</svg>
